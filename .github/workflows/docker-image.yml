name: Docker Image CI

on:
  push:
    branches: [ "devops" ]
  pull_request:
    branches: [ "devops" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    # - name: Login to github registry
    #   run: docker login ghcr.io -u devops -p ghp

    - name: Set up Docker tag
      id: tag
      run: echo "IMAGE_TAG=ghcr.io/Team-Waggle/Backend/waggle-backend:$(date +'%y%m%d%H%M')" >> $GITHUB_ENV

    - name: Build Docker image
      run: docker build . --file Dockerfile --tag ${{ env.IMAGE_TAG }}

    - name: Push Docker image to registry
      run: docker push ${{ env.IMAGE_TAG }}
