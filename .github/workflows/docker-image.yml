name: Docker Image CI

on:
  push:
    branches: [ "devops" ]
  pull_request:
    branches: [ "devops" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Login to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u SHKIM-98 --password-stdin

    - name: Set up Docker tag
      id: tag
      run: echo "IMAGE_TAG=ghcr.io/team-waggle/Bbckend/waggle-backend:$(date +'%y%m%d%H%M')" >> $GITHUB_ENV

    - name: Build Docker image
      run: docker build . --file Dockerfile --tag ${{ env.IMAGE_TAG }}

    - name: Push Docker image to registry
      run: docker push ${{ env.IMAGE_TAG }}
